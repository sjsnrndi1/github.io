<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>게시글 관리</title>
    <link rel="stylesheet" href="/github.io/assets/css/admin/style.css" />
    <link rel="stylesheet" href="/github.io/assets/css/admin/board/style.css" />
  </head>
  <body>
    <div id="header-container"></div>

    <main class="admin-main">
      <section class="admin-card">
        <div class="admin-topbar">
          <h2>게시글 관리</h2>
          <button id="writeBtn" class="admin-btn">글 작성</button>
        </div>

        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>제목</th>
              <th>작성일</th>
            </tr>
          </thead>
          <tbody id="postTableBody"></tbody>
        </table>

        <div id="emptyMessage" class="admin-empty" style="display: none">
          게시글이 없습니다.
        </div>
      </section>
    </main>

    <script src="/github.io/assets/js/admin/header.js"></script>
    <script src="/github.io/assets/js/admin/board/board-list.js"></script>
  </body>
</html>
