<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 상세</title>
    <link rel="stylesheet" href="/github.io/assets/css/admin/style.css" />
    <link rel="stylesheet" href="/github.io/assets/css/admin/board/style.css" />
  </head>
  <body>
    <div id="header-container"></div>

    <div class="container">
      <div class="card">
        <h1 id="post-title"></h1>
        <p id="post-date"></p>

        <hr />

        <div class="section">
          <div id="post-content"></div>
        </div>

        <div class="section" id="attachment-wrapper">
          <hr />

          <h3>첨부파일</h3>
          <div id="post-attachment"></div>
        </div>

        <div class="button-group">
          <button id="list-btn">목록</button>
          <button id="edit-btn">수정</button>
          <button id="delete-btn">삭제</button>
        </div>
      </div>
    </div>

    <script src="/github.io/assets/js/admin/common.js"></script>
    <script src="/github.io/assets/js/admin/header.js"></script>
    <script src="/github.io/assets/js/admin/board/board-detail.js"></script>
  </body>
</html>
